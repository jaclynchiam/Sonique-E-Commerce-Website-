<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sonique - Home Page</title>
    <!--apply the CSS stylesheet -->
    <link rel="stylesheet" href="css/signup.css">
</head>
<body style="padding-bottom: 5%;">
  <div class="page-container">

       <!-- Nav Bar -->
       <nav class="nav">
        <div class="nav-left">
          <a href="homepage.html" class="Sonique">Sonique</a>
        </div>
        <div class="nav-center">
          <a href="about_us.html" class="About-us">About Us</a>
          <a href="productlisting-page.html" class="Shop">Shop</a>
          <a href="productlisting-page.html" class="Product">Product</a>
          <a href="service.html" class="Support">Support</a>
        </div>
        <div class="nav-right">
          <a href="cart.html" class="add-to-card"><img src="images/navbar/add-to-card.png" alt="Add to cart" width="28" height="28"></a>
          <a href="#" class="userprofile"><img src="images/navbar/userprofile.png" alt="User Profile" width="28" height="28"></a>
        </div>
      </nav>

    <main>
        <h1 class="section-title">Sign Up For Sonique</h1>
      
        <div class="form-box">
          <form id="signupForm" action="/signup" method="post">
        
            <!-- First and Last Name Side by Side -->
            <div class="name-row">
              <div class="floating-input-group">
                <input type="text" id="firstname" name="firstname" required />
                <label for="firstname">First Name <span style="color:red">*</span></label>
              </div>
        
              <div class="floating-input-group">
                <input type="text" id="lastname" name="lastname" required />
                <label for="lastname">Last Name <span style="color:red">*</span></label>
              </div>
            </div>
        
            <!-- Username -->
            <div class="floating-input-group">
              <input type="text" id="username" name="username" required />
              <label for="username">Username <span style="color:red">*</span></label>
            </div>
        
            <!-- Email -->
            <div class="floating-input-group">
              <input type="email" id="email" name="email" required placeholder=""/>
              <label for="email">Email <span style="color:red">*</span></label>
            </div>
        
            <div class="floating-input-group password-wrapper">
              <input type="password" id="password" name="password" required />
              <label for="password">Password <span style="color:red">*</span></label>
              <span id="togglePassword" class="toggle-password-text" style="cursor:pointer;">Show</span>

            </div>
            
            <!-- Terms -->
            <div class="checkbox-group">
              <label>
                <input type="checkbox" id="terms" name="terms" required />
                By creating an account, you agree to our 
                <a href="faq.html" target="_blank">Terms and Conditions</a>
                and have read and acknowledge the Global Privacy Statement 
              </label>
            </div>

            <div class="login-link">
            <a href="login.html">Already registered? Log In here!</a>
          </div>
        
            <!-- Submit Button -->
            <input class="submit_btn" type="submit" value="Sign Up" />
          </form>

        </div>
        
      </main>

      <script src="javascript/newsletterValidation.js"></script>   

      <script src="javascript/signup.js"></script>

<!-- Success Modal -->
<div id="successModal" class="modal">
  <div class="modal-content">
    <h3>Welcome, User!</h3>
    <p>You've successfully created your account.</p>
    <button id="closeModalBtn" class="modal-btn">Continue</button>
  </div>
</div>

</body>
</html>
