
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sonique - Reset Password Page </title>
    <!--apply the CSS stylesheet -->
    <link rel="stylesheet" href="css/resetpassword.css">


</head>
<body style="padding-bottom: 5%;">
  <div class="page-container">

     <!--nav bar-->
     <nav class="nav">
      <div class="nav-left">
        <a href="homepage.html" class="Sonique">Sonique</a>
      </div>
      <div class="nav-center">
        <a href="about_us.html" class="About-us">About Us</a>
        <a href="productlisting-page.html" class="Shop">Shop</a>
        <a href="productlisting-page.html" class="Product">Product</a>
        <a href="service.html" class="Support">Support</a>
      </div>
      <div class="nav-right">
        <a href="cart.html" class="add-to-card" ><img src="images/navbar/add-to-card.png" alt="Add to cart" width="28" height="28"></a>
        <a href="#" class="userprofile"><img src="images/navbar/userprofile.png" alt="User Profile" width="28" height="28"></a>
      </div>
    </nav> 

    <main>

      <h1 class="section-title">Reset Your Sonique Password</h1>

      <div class="form-box">
        <form id="resetForm">
          
        <!-- New Password Field -->
         <div class="float-label-input" style="position: relative;">
          <input type="password" id="newPassword" name="newPassword" required />
          <label for="newPassword">New Password <span style="color: red;">*</span></label>
          <span class="toggle-password" data-target="newPassword" style="cursor: pointer; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; color: #333;">Show</span>
        </div>
        
        <!-- Confirm Password Field -->
         <div class="float-label-input" style="position: relative;">
          <input type="password" id="confirmPassword" name="confirmPassword" required />
          <label for="confirmPassword">Confirm Password <span style="color: red;">*</span></label>
          <span class="toggle-password" data-target="confirmPassword"style="cursor: pointer; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; color: #333;">Show</span>
        </div>
        
        <input class="submit_btn" type="submit" value="Reset Password">
        
      </form>
      

    </main>

  </div> 

    <!-- Success Modal -->
    <div id="successModal" class="modal">

      <div class="modal-content">

        <h3>Password Reset Successful</h3>
        <br>
        <button class="modal-btn" onclick="closeModal()">Close</button>

      </div>

    </div>

    <script src="javascript/newsletterValidation.js"></script>

    <script src="javascript/resetPassword.js"></script>
    

</body>
</html>
